<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova SA | Debug View</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-2xl font-bold mb-4">Debug List (Check if these exist in your repo)</h1>
    <ul id="debugList" class="bg-white p-4 rounded shadow"></ul>
    <script>
        const files = ["1000503924.jpg", "1000503928.jpg", "1000503939.jpg", "1000504090.jpg", "1000504093.jpg", "1000504096.jpg", "1000504099.jpg", "1000504106.jpg", "1000504112.jpg", "1000504115.jpg"];
        const list = document.getElementById('debugList');
        files.forEach(f => {
            list.innerHTML += `<li class="p-2 border-b">File: <b>${f}</b> <a href="${f}" target="_blank" class="text-blue-500">(Click to test link)</a></li>`;
        });
    </script>
</body>
</html>
