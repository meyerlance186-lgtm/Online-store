<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova SA | Debug Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-gray-900 font-sans p-4">
    <h1 class="text-xl font-bold mb-4">Diagnostics: Checking image paths...</h1>
    <div id="productGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

    <script>
        const products = [
            { id: 1, name: "Hot Water Bottle", img: "1000503924.jpg" },
            { id: 2, name: "Fleece Hoodie", img: "1000503928.jpg" },
            { id: 3, name: "Warming Tray", img: "1000503939.jpg" },
            { id: 4, name: "Commuter Gloves", img: "1779490937682.jpeg" },
            { id: 5, name: "Desktop Heater", img: "1000504093.jpg" },
            { id: 6, name: "Gas Heater Adapter", img: "1000504096.jpg" },
            { id: 7, name: "Thermal Leggings", img: "1000504099.jpg" },
            { id: 8, name: "Smart Flask", img: "1000504106.jpg" },
            { id: 9, name: "WiFi UPS", img: "1000504112.jpg" },
            { id: 10, name: "LED Light", img: "1000504115.jpg" }
        ];

        const grid = document.getElementById('productGrid');
        products.forEach(p => {
            const path = `downloads/${p.img}`;
            grid.innerHTML += `
                <div class="bg-white p-4 rounded shadow border">
                    <h2 class="font-bold">${p.name}</h2>
                    <p class="text-xs text-red-600">Trying to load: <b>${path}</b></p>
                    <img src="${path}" class="w-20 h-20 object-cover mt-2" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                    <p class="text-xs text-red-500 hidden">Error loading image!</p>
                </div>
            `;
        });
    </script>
</body>
</html>
