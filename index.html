<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova SA | Winter Survival Essentials</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-hidden { display: none; }
        .modal-active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans flex flex-col min-h-screen">

    <div class="bg-indigo-900 text-white text-center text-xs py-2 uppercase tracking-widest font-semibold">
        Winter Sale: Fast Delivery Nationwide
    </div>

    <nav class="bg-white shadow-sm p-4 flex justify-between items-center sticky top-0 z-40">
        <div class="text-2xl font-black tracking-tighter">NOVA<span class="text-indigo-600">.</span></div>
        <button onclick="toggleModal('cartModal')" class="relative bg-indigo-600 text-white px-4 py-2 rounded shadow hover:bg-indigo-700 transition font-bold">
            Cart (<span id="cartCount">0</span>)
        </button>
    </nav>

    <header class="bg-white py-16 px-4 text-center border-b border-gray-200">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-gray-900">Winter Survival Essentials.</h1>
        <p class="text-gray-600 max-w-xl mx-auto mb-8">Curated gear to keep you warm and powered up. Delivered to your door.</p>
    </header>

    <main class="flex-grow p-4 md:p-8 max-w-6xl mx-auto w-full">
        <h2 class="text-2xl font-bold mb-6 border-b pb-2 text-gray-800">Trending Now</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="productGrid">
            </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-8 text-center text-sm">
        <p>&copy; 2026 Nova SA. Fulfillment via our local logistics partners.</p>
    </footer>

    <div id="cartModal" class="modal-hidden fixed inset-0 bg-black bg-opacity-50 z-50 justify-center items-center">
        <div class="bg-white p-6 rounded-lg w-full max-w-md mx-4 shadow-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold">Your Cart</h3>
                <button onclick="toggleModal('cartModal')" class="text-gray-500 font-bold text-xl">&times;</button>
            </div>
            <div id="cartItems" class="space-y-4 mb-4"></div>
            <div class="border-t pt-4">
                <div class="flex justify-between font-bold text-lg mb-4">
                    <span>Total:</span>
                    <span id="cartTotal">R0.00</span>
                </div>
                <button onclick="checkoutToPayFast()" class="w-full bg-indigo-600 text-white py-3 rounded font-bold hover:bg-indigo-700 transition">
                    Checkout Securely
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- WINTER PRODUCT DATABASE (With stable image assets) ---
        const products = [
            { id: 1, name: "Rechargeable Hot Water Bottle", price: 479.00, img: "https://m.media-amazon.com/images/I/61S1q084qSL._AC_SL1000_.jpg", desc: "Plugs in for 10 mins, stays hot for hours. No boiling needed." },
            { id: 2, name: "Wearable Fleece Blanket Hoodie", price: 499.00, img: "https://m.media-amazon.com/images/I/71Y9-8V7d9L._AC_SL1500_.jpg", desc: "Ultra-plush warmth. The ultimate winter essential." },
            { id: 3, name: "Smart Electric Warming Tray", price: 699.00, img: "https://m.media-amazon.com/images/I/61G1z3T9LzL._AC_SL1000_.jpg", desc: "Keep meals hot during long winter evenings." },
            { id: 4, name: "Auto-Heated Commuter Gloves", price: 449.00, img: "https://m.media-amazon.com/images/I/71sT9o6U+gL._AC_SL1500_.jpg", desc: "USB-powered warmth for early morning commutes." },
            { id: 5, name: "Mini Desktop PTC Heater", price: 399.00, img: "https://m.media-amazon.com/images/I/61O27S5W1jL._AC_SL1000_.jpg", desc: "Low-wattage heating, won't trip your inverter." },
            { id: 6, name: "Portable Gas Heater Adapter", price: 449.00, img: "https://m.media-amazon.com/images/I/61v-QZ4O3kL._AC_SL1000_.jpg", desc: "Grid-free heat for standard CADAC cylinders." },
            { id: 7, name: "Fleece-Lined Winter Leggings", price: 299.00, img: "https://m.media-amazon.com/images/I/61yO86W0pHL._AC_SL1000_.jpg", desc: "Thermal comfort that looks like regular tights." },
            { id: 8, name: "Smart Thermos (Temp Display)", price: 299.00, img: "https://m.media-amazon.com/images/I/51w7Y+8r0LL._AC_SL1000_.jpg", desc: "Know the exact temperature of your coffee." },
            { id: 9, name: "Mini UPS for WiFi Router", price: 649.00, img: "https://m.media-amazon.com/images/I/61WfQ1wL1xL._AC_SL1000_.jpg", desc: "8+ hours of internet during load shedding." },
            { id: 10, name: "Magnetic Motion LED Light", price: 299.00, img: "https://wootech.co.za/wp-content/uploads/2023/11/LED-Rechargeable-Magnetic-Motion-Sensor-Light.jpg", desc: "Automatic lighting for dark winter mornings." }
        ];

        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-4 flex flex-col hover:shadow-md transition">
                        <img src="${p.img}" alt="${p.name}" class="w-full h-48 object-cover rounded mb-4">
                        <h3 class="font-bold text-lg mb-1">${p.name}</h3>
                        <p class="text-gray-500 text-sm mb-4 flex-grow">${p.desc}</p>
                        <div class="flex justify-between items-center mt-auto">
                            <span class="font-black text-xl text-indigo-900">R${p.price.toFixed(2)}</span>
                            <button onclick="addToCart(${p.id})" class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm font-bold hover:bg-indigo-700">Add</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push({ ...product, qty: 1 });
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const cartItems = document.getElementById('cartItems');
            cartItems.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center text-sm">
                    <span>${item.name}</span>
                    <span class="font-bold">R${item.price.toFixed(2)}</span>
                </div>
            `).join('');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cartTotal').innerText = `R${total.toFixed(2)}`;
        }

        function toggleModal(id) {
            document.getElementById(id).classList.toggle('modal-hidden');
            document.getElementById(id).classList.toggle('modal-active');
        }

        function checkoutToPayFast() {
            if (cart.length === 0) return alert("Your cart is empty!");
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            const form = document.createElement("form");
            form.action = "https://sandbox.payfast.co.za/eng/process";
            form.method = "POST";
            form.innerHTML = `
                <input type="hidden" name="merchant_id" value="10000100">
                <input type="hidden" name="merchant_key" value="46f0cd694581a">
                <input type="hidden" name="amount" value="${total.toFixed(2)}">
                <input type="hidden" name="item_name" value="Nova SA Order">
            `;
            document.body.appendChild(form);
            form.submit();
        }

        renderProducts();
    </script>
</body>
</html>
