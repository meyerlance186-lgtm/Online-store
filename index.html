<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova SA | The Winter Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal-hidden { display: none; }
        .modal-active { display: flex; }
        .winter-gradient { background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 100%); }
    </style>
</head>
<body class="winter-gradient text-gray-900 font-sans flex flex-col min-h-screen">

    <div class="bg-slate-800 text-blue-200 text-center text-xs py-2 uppercase tracking-widest font-bold">
        ❄️ Winter Essentials: Stay Warm, Stay Connected.
    </div>

    <nav class="bg-white/80 backdrop-blur-md shadow-sm p-4 flex justify-between items-center sticky top-0 z-40">
        <div class="text-2xl font-black tracking-tighter text-slate-900">NOVA<span class="text-orange-500">.</span></div>
        <button onclick="toggleModal('cartModal')" class="relative bg-slate-900 text-white px-5 py-2 rounded-full shadow hover:bg-black transition font-bold text-sm">
            Cart (<span id="cartCount">0</span>)
        </button>
    </nav>

    <header class="py-20 px-4 text-center">
        <h1 class="text-5xl md:text-6xl font-extrabold mb-4 text-slate-900 tracking-tight">Warmth for the Cold.</h1>
        <p class="text-lg text-slate-600 max-w-xl mx-auto">Curated gear to keep you cozy and powered up through the South African winter. Fast, reliable delivery.</p>
    </header>

    <main class="flex-grow p-4 md:p-8 max-w-6xl mx-auto w-full">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="productGrid"></div>
    </main>

    <div id="detailsModal" class="modal-hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 justify-center items-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-lg shadow-2xl border border-blue-50">
            <h3 id="modalTitle" class="text-3xl font-extrabold mb-4 text-slate-900"></h3>
            <p id="modalDesc" class="text-slate-600 mb-8 leading-relaxed"></p>
            <div class="flex gap-4">
                <button onclick="toggleModal('detailsModal')" class="flex-1 bg-slate-100 py-3 rounded-full font-bold hover:bg-slate-200 text-slate-700">Close</button>
                <button id="modalAddBtn" class="flex-1 bg-orange-500 text-white py-3 rounded-full font-bold hover:bg-orange-600 shadow-lg shadow-orange-200">Add to Cart</button>
            </div>
        </div>
    </div>

    <div id="cartModal" class="modal-hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 justify-center items-center p-4">
        <div class="bg-white p-8 rounded-3xl w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold">Your Winter Kit</h3>
                <button onclick="toggleModal('cartModal')" class="text-slate-400 font-bold text-2xl">&times;</button>
            </div>
            <div id="cartItems" class="space-y-4 mb-6"></div>
            <div class="border-t border-slate-100 pt-6">
                <div class="flex justify-between font-bold text-xl mb-6 text-slate-900">
                    <span>Total:</span>
                    <span id="cartTotal">R0.00</span>
                </div>
                <button onclick="checkoutToPayFast()" class="w-full bg-orange-500 text-white py-4 rounded-full font-bold hover:bg-orange-600 shadow-lg shadow-orange-200 transition">
                    Secure Checkout
                </button>
            </div>
        </div>
    </div>

    <script>
        // Exact filenames mapped to the products
        const products = [
            { id: 1, name: "Rechargeable Hot Water Bottle", price: 479.00, img: "s-pdpxl.file (10).jpg", desc: "Fast-heating, cord-free comfort.", longDesc: "Ditch the traditional kettle. This electric hot water bottle heats up in just 10 minutes and retains warmth for up to 4 hours." },
            { id: 2, name: "Wearable Fleece Hoodie (Unisex)", price: 599.00, img: "s-pdpxl.file (2).webp", desc: "One-size-fits-all plush warmth.", longDesc: "Experience the ultimate in couch-day luxury. This oversized hoodie features a premium, thick-pile fleece lining." },
            { id: 3, name: "Smart Foldable Warming Tray", price: 1499.00, img: "s-pdpxl.file (4).jpg", desc: "Restaurant-quality plate warmth.", longDesc: "Never let your meal turn cold again. This sleek warming tray keeps plates at the perfect serving temperature." },
            { id: 4, name: "Auto-Heated Commuter Gloves", price: 449.00, img: "s-pdpxl.file (8).jpg", desc: "Precision warmth for travel.", longDesc: "USB-powered gloves that maintain dexterity while delivering consistent heat to your fingers." },
            { id: 5, name: "Low-Wattage Mini Desktop Heater", price: 499.00, img: "s-pdpxl.file.jpg", desc: "Energy-efficient desk heating.", longDesc: "The ultimate solution for your home office. Compact, focused warmth with minimal power consumption." },
            { id: 6, name: "Portable Gas Heater Adapter", price: 899.00, img: "s-zoom.file (1).jpg", desc: "Grid-free emergency heat.", longDesc: "Transform your standard gas cylinder into a reliable emergency heater." },
            { id: 7, name: "Thermal Fleece-Lined Leggings", price: 699.00, img: "s-zoom.file (14).jpg", desc: "Style meets thermal protection.", longDesc: "Features a hidden, ultra-soft fleece interior that feels like a blanket against your skin." },
            { id: 8, name: "Smart Temp Display Flask", price: 399.00, img: "s-zoom.file (19).jpg", desc: "LED temp-monitored hydration.", longDesc: "High-precision LED touch display monitors beverage temp for up to 12 hours." },
            { id: 9, name: "Mini UPS for WiFi Router", price: 899.00, origPrice: 1199.00, img: "s-zoom.file (5).jpg", desc: "Non-stop connectivity.", longDesc: "Ensures your WiFi router remains powered for hours during South African power outages." },
            { id: 10, name: "Motion Sensor LED Light", price: 249.00, origPrice: 349.00, img: "s-zoom.file (9).jpg", desc: "Smart ambient safety lighting.", longDesc: "Magnetic, motion-activated lights perfect for hallways or bedside areas." }
        ];

        const grid = document.getElementById('productGrid');
        products.forEach(p => {
            let priceDisplay = `<span class="font-black text-2xl text-slate-900">R${p.price.toFixed(2)}</span>`;
            if (p.origPrice) {
                priceDisplay = `<div class="flex flex-col"><span class="text-xs text-slate-400 line-through">R${p.origPrice.toFixed(2)}</span><span class="font-black text-2xl text-orange-600">R${p.price.toFixed(2)}</span></div>`;
            }

            grid.innerHTML += `
                <div class="bg-white rounded-3xl shadow-lg border border-slate-100 p-5 flex flex-col hover:shadow-xl transition">
                    <img src="${p.img}" alt="${p.name}" class="w-full h-56 object-cover rounded-2xl mb-5 bg-slate-50">
                    <h3 class="font-bold text-xl mb-1">${p.name}</h3>
                    <p class="text-slate-500 text-sm mb-6 flex-grow">${p.desc}</p>
                    <div class="flex items-center justify-between mt-auto">
                        ${priceDisplay}
                        <button onclick="showDetails(${p.id})" class="bg-slate-100 text-slate-900 px-5 py-2.5 rounded-full text-sm font-bold hover:bg-orange-100 transition">Details</button>
                    </div>
                </div>
            `;
        });

        function showDetails(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalDesc').innerText = p.longDesc;
            document.getElementById('modalAddBtn').onclick = () => { addToCart(p.id); toggleModal('detailsModal'); };
            toggleModal('detailsModal');
        }

        let cart = [];
        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cartCount').innerText = cart.length;
            const items = document.getElementById('cartItems');
            items.innerHTML = cart.map(i => `<div class="flex justify-between py-2 border-b"><span>${i.name}</span><span>R${i.price}</span></div>`).join('');
            const total = cart.reduce((sum, i) => sum + i.price, 0);
            document.getElementById('cartTotal').innerText = `R${total.toFixed(2)}`;
        }

        function toggleModal(id) { 
            const modal = document.getElementById(id);
            if (modal.classList.contains('modal-hidden')) {
                modal.classList.remove('modal-hidden');
                modal.classList.add('modal-active');
            } else {
                modal.classList.remove('modal-active');
                modal.classList.add('modal-hidden');
            }
        }
        function checkoutToPayFast() { alert("Redirecting to checkout..."); }
    </script>
</body>
</html>
